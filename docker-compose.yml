services:
  postgres:
    image: postgres:16
    container_name: garmin-pipeline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garmin}
      POSTGRES_DB: ${POSTGRES_DB:-garmin_sleep}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/ddl:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garmin} -d ${POSTGRES_DB:-garmin_sleep}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
